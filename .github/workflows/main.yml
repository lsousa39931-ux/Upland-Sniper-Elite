name: Sniper_Realtime
on:
  workflow_dispatch:
jobs:
  run-sniper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install requests
      - name: Executar Sniper
        run: python sniper.py
